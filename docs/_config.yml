title: KiranaOS Documentation
description: Governed merchant operations and Order-to-Cash infrastructure for kirana and small-store pilots.
url: "https://sankarshanmukhopadhyay.github.io"
baseurl: "/kiranaos"
repository: sankarshanmukhopadhyay/kiranaos

theme: just-the-docs
color_scheme: light
search_enabled: true
heading_anchors: true
permalink: pretty

aux_links:
  "KiranaOS on GitHub":
    - "https://github.com/sankarshanmukhopadhyay/kiranaos"
aux_links_new_tab: true

nav_external_links:
  - title: Repository
    url: https://github.com/sankarshanmukhopadhyay/kiranaos
    hide_icon: false

back_to_top: true
back_to_top_text: "Back to top"
footer_content: "KiranaOS documentation. Published as executable operational guidance for governed merchant workflows."

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

collections_dir: collections
